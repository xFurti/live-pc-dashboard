<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Live PC Health · Mission Control</title>

  <!-- Premium typography: Space Grotesk (headings) + JetBrains Mono (numbers).
       Fallbacks mean it still works offline if the CDN is unreachable. -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="/style.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
</head>
<body>

  <header class="topbar">
    <div class="title-wrap">
      <h1 class="title">LIVE PC HEALTH</h1>
      <span class="subtitle">REAL-TIME SYSTEM TELEMETRY</span>
    </div>
    <span id="status" class="status disconnected">● Disconnected</span>
  </header>

  <main>
    <!-- ─── CPU gauge card ───────────────────────────────────────── -->
    <section class="card glass" data-metric="cpu">
      <h2 class="card-label">CPU</h2>
      <div class="gauge-wrap">
        <!-- SVG radial gauge: a background "track" circle and a colored
             "fill" circle that we animate via stroke-dashoffset in JS. -->
        <svg class="gauge" viewBox="0 0 120 120">
          <circle class="gauge-bg"  cx="60" cy="60" r="52" />
          <circle class="gauge-fill" cx="60" cy="60" r="52" />
        </svg>
        <div class="gauge-readout">
          <div class="big-value" id="cpu-value">--%</div>
          <div class="gauge-caption">UTILIZATION</div>
        </div>
      </div>
      <canvas id="cpu-chart" class="sparkline"></canvas>
    </section>

    <!-- ─── RAM gauge card ───────────────────────────────────────── -->
    <section class="card glass" data-metric="ram">
      <h2 class="card-label">MEMORY</h2>
      <div class="gauge-wrap">
        <svg class="gauge" viewBox="0 0 120 120">
          <circle class="gauge-bg"  cx="60" cy="60" r="52" />
          <circle class="gauge-fill" cx="60" cy="60" r="52" />
        </svg>
        <div class="gauge-readout">
          <div class="big-value" id="ram-value">--%</div>
          <div class="sub-value" id="ram-detail">-- / -- GiB</div>
        </div>
      </div>
      <canvas id="ram-chart" class="sparkline"></canvas>
    </section>

    <!-- ─── Disk gauge card ──────────────────────────────────────── -->
    <section class="card glass" data-metric="disk">
      <div class="card-header-row">
        <h2 class="card-label">DISK</h2>
        <select id="disk-select" class="disk-select" aria-label="Select disk"></select>
      </div>
      <div class="gauge-wrap">
        <svg class="gauge" viewBox="0 0 120 120">
          <circle class="gauge-bg"  cx="60" cy="60" r="52" />
          <circle class="gauge-fill" cx="60" cy="60" r="52" />
        </svg>
        <div class="gauge-readout">
          <div class="big-value" id="disk-value">--%</div>
          <div class="sub-value" id="disk-detail">-- / -- GiB</div>
        </div>
      </div>
      <canvas id="disk-chart" class="sparkline"></canvas>
    </section>

    <!-- ─── Process panel (top CPU + top RAM) ────────────────────── -->
    <section class="process-panel glass">
      <div class="process-table-wrapper">
        <h3 class="panel-h3">🔥 Top by CPU</h3>
        <table class="process-table">
          <thead>
            <tr><th>PID</th><th>Name</th><th class="num">CPU%</th><th class="num">RAM</th></tr>
          </thead>
          <tbody id="top-cpu-table"><!-- rows injected by app.js --></tbody>
        </table>
      </div>

      <div class="process-table-wrapper">
        <h3 class="panel-h3">💾 Top by RAM</h3>
        <table class="process-table">
          <thead>
            <tr><th>PID</th><th>Name</th><th class="num">CPU%</th><th class="num">RAM</th></tr>
          </thead>
          <tbody id="top-memory-table"><!-- rows injected by app.js --></tbody>
        </table>
      </div>
    </section>
  </main>

  <footer>
    <p>Mission Control · WebSocket stream · last sync <span id="last-update">never</span></p>
  </footer>

  <script src="/app.js"></script>
</body>
</html>
