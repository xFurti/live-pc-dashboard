<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Live PC Health Dashboard</title>
  <link rel="stylesheet" href="/style.css" />
  <!-- Chart.js: a charting library loaded from a CDN.
       In a production app you'd self-host it, but a CDN is fine for a portfolio demo. -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
</head>
<body>
  <header>
    <h1>🖥️ Live PC Health Dashboard</h1>
    <span id="status" class="status disconnected">● Disconnected</span>
  </header>

  <main>
    <!-- Each "card" shows a live percentage and a chart of the last N samples. -->
    <section class="card">
      <h2>CPU</h2>
      <div class="big-value" id="cpu-value">--%</div>
      <canvas id="cpu-chart"></canvas>
    </section>

    <section class="card">
      <h2>RAM</h2>
      <div class="big-value" id="ram-value">--%</div>
      <div class="sub-value" id="ram-detail">-- / -- GB</div>
      <canvas id="ram-chart"></canvas>
    </section>

    <section class="card">
      <h2>Disk</h2>
      <div class="big-value" id="disk-value">--%</div>
      <div class="sub-value" id="disk-detail">-- / -- GB</div>
      <canvas id="disk-chart"></canvas>
    </section>
  </main>

  <footer>
    <p>Step 3 · WebSocket + Chart.js · <span id="last-update">never</span></p>
  </footer>

  <!-- Our app logic: open the WebSocket, update the DOM, push samples into the charts. -->
  <script src="/app.js"></script>
</body>
</html>
